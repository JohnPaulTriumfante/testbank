{% extends "base.html" %}

{% block title %}Error - Test Bank System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 offset-lg-3">
        <div class="card border-danger mt-5">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">⚠️ Error</h5>
            </div>
            <div class="card-body">
                <p class="card-text fs-5 mb-4">{{ error_message }}</p>
                <a href="javascript:history.back()" class="btn btn-primary btn-lg w-100">← Go Back</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
